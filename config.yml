# Websites to crawl via sitemap for new content
websites:
  - name: Anthropic Research
    sitemap: https://www.anthropic.com/sitemap.xml
    include_patterns:
      - /research/
      - /news/
  - name: OpenAI Blog
    sitemap: https://openai.com/sitemap.xml
    include_patterns:
      - /index/
      - /research/
  - name: DeepMind Blog
    sitemap: https://deepmind.google/sitemap.xml
    include_patterns:
      - /research/
      - /discover/
  - name: Apollo Research
    sitemap: https://www.apolloresearch.ai/sitemap.xml
    include_patterns:
      - /blog/
      - /research/
  - name: Epoch AI
    sitemap: https://epoch.ai/sitemap-index.xml
    include_patterns:
      - /blog/

# National AI Safety Institutes
aisi_websites:
  - name: US AI Safety Institute (NIST)
    url: https://www.nist.gov/caisi
    rss: https://www.nist.gov/news-events/news/rss.xml
    keywords:
      - artificial intelligence
      - AI safety
      - AI risk
  - name: UK AI Safety Institute
    url: https://www.aisi.gov.uk/research
    urls:
      - https://www.aisi.gov.uk/blog
  - name: Canada AI Safety Institute (CAISI)
    url: https://ised-isde.canada.ca/site/artificial-intelligence-safety-institute/en
  - name: Japan AI Safety Institute (J-AISI)
    url: https://aisi-go-jp.translate.goog/activity/?_x_tr_sl=auto&_x_tr_tl=en&_x_tr_hl=en-US
  - name: Singapore AI Safety Institute
    url: https://www.sgaisi.sg/our-works/
  - name: European AI Office
    url: https://digital-strategy.ec.europa.eu/en/news
  - name: Korea AI Safety Institute
    url: https://www.msit.go.kr/eng/index.do

