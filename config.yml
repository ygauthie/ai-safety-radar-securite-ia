# AI Safety Daily Brief Configuration

# Source credibility tiers:
#   tier 1: Institutional / peer-reviewed (government, journals, established think tanks)
#   tier 2: Established research & expert analysis (labs, safety orgs, expert newsletters)
#   tier 3: Community & general discussion (forums, HN, GitHub, general commentary)

# GitHub topics to discover repos dynamically (top 20 most recently active per topic)
github_topics:
  - ai-safety
  - llm-alignment
  - llm-safety
  - ai-alignment

# GitHub repositories to track for AI safety developments
github_repos:
  # Anthropic
  - anthropics/anthropic-cookbook
  - anthropics/courses
  # OpenAI
  - openai/openai-cookbook
  - openai/evals
  # DeepMind
  - google-deepmind/gemma
  # Alignment & Safety Research
  - EleutherAI/lm-evaluation-harness
  - centerforaisafety/HarmBench
  - paul-gauthier/aider
  # Interpretability
  - TransformerLensOrg/TransformerLens
  # Governance
  - stanford-crfm/helm

# ArXiv categories and keywords for AI safety papers
arxiv:
  tier: 2
  categories:
    - cs.AI
    - cs.CL
    - cs.LG
    - cs.CY  # Computers and Society (policy/governance)
  keywords:
    - activation steering
    - adversarial robustness
    - AI ethics
    - AI evaluation
    - AI governance
    - AI guardrails
    - AI oversight
    - AI regulation
    - AI safety
    - AI Safety Institute
    - AI Security Institute
    - alignment
    - CAISI
    - collusion risk
    - constitutional AI
    - content provenance
    - deception
    - deepfake detection
    - existential risk
    - hallucination
    - honesty evaluation
    - interpretability
    - jailbreak
    - mechanistic interpretability
    - multilingual AI safety
    - red teaming
    - responsible AI
    - RLHF
    - scalable oversight
    - synthetic content detection
    - value alignment

