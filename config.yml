# AI Safety Daily Brief Configuration

# GitHub topics to discover repos dynamically (top 20 most recently active per topic)
github_topics:
  - ai-safety
  - llm-alignment
  - llm-safety
  - ai-alignment

# GitHub repositories to track for AI safety developments
github_repos:
  # Anthropic
  - anthropics/anthropic-cookbook
  - anthropics/courses
  # OpenAI
  - openai/openai-cookbook
  - openai/evals
  # DeepMind
  - google-deepmind/gemma
  # Alignment & Safety Research
  - EleutherAI/lm-evaluation-harness
  - centerforaisafety/HarmBench
  - paul-gauthier/aider
  # Interpretability
  - TransformerLensOrg/TransformerLens
  # Governance
  - stanford-crfm/helm

# ArXiv categories and keywords for AI safety papers
arxiv:
  categories:
    - cs.AI
    - cs.CL
    - cs.LG
    - cs.CY  # Computers and Society (policy/governance)
  keywords:
    - activation steering
    - adversarial robustness
    - AI ethics
    - AI evaluation
    - AI governance
    - AI guardrails
    - AI oversight
    - AI regulation
    - AI safety
    - AI Safety Institute
    - AI Security Institute
    - alignment
    - CAISI
    - collusion risk
    - constitutional AI
    - content provenance
    - deception
    - deepfake detection
    - existential risk
    - hallucination
    - honesty evaluation
    - interpretability
    - jailbreak
    - mechanistic interpretability
    - multilingual AI safety
    - red teaming
    - responsible AI
    - RLHF
    - scalable oversight
    - synthetic content detection
    - value alignment

# Peer-reviewed journal RSS feeds (keyword-filtered for AI safety relevance)
journal_feeds:
  # High-impact general science
  - name: Nature
    url: https://www.nature.com/nature.rss
  - name: Science
    url: https://www.science.org/rss/news_current.xml
  - name: PNAS
    url: https://www.pnas.org/rss/current.xml
  - name: PLOS ONE (Computer Science)
    url: https://journals.plos.org/plosone/feed/atom?subject=Computer+and+information+sciences
  # AI/ML specialist journals
  - name: Nature Machine Intelligence
    url: https://www.nature.com/natmachintell.rss
  - name: AI & Society (Springer)
    url: https://link.springer.com/search.rss?facet-journal-id=146&query=
  - name: Ethics and Information Technology
    url: https://link.springer.com/search.rss?facet-journal-id=10676&query=

# RSS feeds to monitor
rss_feeds:
  # Community forums
  - name: Alignment Forum
    url: https://www.alignmentforum.org/feed.xml
  - name: LessWrong (AI tag)
    url: https://www.lesswrong.com/feed.xml?view=community-rss&karmaThreshold=30
  # Substacks
  - name: Import AI (Jack Clark)
    url: https://importai.substack.com/feed
  - name: Hyperdimensional (Dean Ball)
    url: https://www.hyperdimensional.co/feed
  - name: Don't Worry About the Vase (Zvi Mowshowitz)
    url: https://thezvi.substack.com/feed
  - name: The Cognitive Revolution (Nathan Labenz)
    url: https://cognitiverevolution.substack.com/feed
  - name: Planned Obsolescence (Ajeya Cotra & Kelsey Piper)
    url: https://www.planned-obsolescence.org/feed
  - name: Miles Brundage
    url: https://milesbrundage.substack.com/feed
  - name: AI Safety Newsletter (CAIS)
    url: https://newsletter.safe.ai/feed
  - name: Interconnects (Nathan Lambert)
    url: https://www.interconnects.ai/feed
  - name: AI Snake Oil (Narayanan & Kapoor)
    url: https://aisnakeoil.substack.com/feed
  - name: AI Safety & Governance (Victor Akinwande)
    url: https://www.safeai.news/feed
  # AI Safety Research Labs
  - name: METR
    url: https://metr.org/feed.xml
  - name: Alignment Research Center (ARC)
    url: https://alignment.org/blog/feed
  - name: Future of Life Institute
    url: https://futureoflife.org/feed/
