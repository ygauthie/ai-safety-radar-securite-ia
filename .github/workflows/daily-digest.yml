name: Daily Digest

on:
  schedule:
    - cron: "0 9 * * *" # 5:00 AM ET (UTC-4 EDT)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install

      - name: Pre-fetch non-Substack RSS feeds via curl
        run: |
          mkdir -p .feed-cache
          while IFS='|' read -r name url; do
            slug=$(echo "$name" | tr ' ()/' '____' | tr -cd 'a-zA-Z0-9_-')
            echo "Fetching $name..."
            curl -sL --max-time 15 -o ".feed-cache/$slug.xml" "$url" || echo "  Failed: $name"
          done <<'FEEDS'
          Alignment Forum|https://www.alignmentforum.org/feed.xml
          LessWrong|https://www.lesswrong.com/feed.xml?view=community-rss&karmaThreshold=30
          Hyperdimensional (Dean Ball)|https://www.hyperdimensional.co/feed
          Planned Obsolescence (Ajeya Cotra & Kelsey Piper)|https://www.planned-obsolescence.org/feed
          AI Safety Newsletter CAIS|https://newsletter.safe.ai/feed
          AI Safety Governance|https://www.safeai.news/feed
          METR|https://metr.org/feed.xml
          ARC|https://alignment.org/blog/feed
          Future of Life Institute|https://futureoflife.org/feed/
          MIRI|https://intelligence.org/feed/
          Georgetown CSET|https://cset.georgetown.edu/feed/
          AI Now Institute|https://ainowinstitute.org/feed
          Nature|https://www.nature.com/nature.rss
          Science|https://www.science.org/rss/news_current.xml
          PNAS|https://www.pnas.org/rss/current.xml
          PLOS ONE (Computer Science)|https://journals.plos.org/plosone/feed/atom?subject=Computer+and+information+sciences
          Nature Machine Intelligence|https://www.nature.com/natmachintell.rss
          AI & Society (Springer)|https://link.springer.com/search.rss?facet-journal-id=146&query=
          Ethics and Information Technology|https://link.springer.com/search.rss?facet-journal-id=10676&query=
          FEEDS
          ls -la .feed-cache/

      - name: Generate daily digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm start

      - name: Update manifest
        run: pnpm manifest

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ manifest.json feed.xml
          git diff --staged --quiet || git commit -m "Daily AI safety digest $(date -u +%Y-%m-%d)"
          git push
