name: Translate Existing Digests

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install

      - name: Translate missing French digests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pnpm translate-existing

      - name: Update manifest
        run: pnpm manifest

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ manifest.json feed.xml
          git diff --staged --quiet || git commit -m "Translate existing digests to French"
          git push
