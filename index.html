<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Radar</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Radar RSS" href="feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fbfbfd;
      --border: #e4e6ec;
      --border-strong: #d1d5dc;
      --text: #14161a;
      --text-muted: #6b6f78;
      --accent: #0b6aa8;
      --accent-hover: #084e7c;
      --accent-subtle: #0b6aa814;
      --link: #0b6aa8;
      --green: #2a7d4f;
      --orange: #b45309;
      --red: #df2039;
      --strong: #0a0b0d;
      --header-height: 56px;
    }

    [data-theme="dark"] {
      --bg: #101922;
      --surface: #161b22;
      --border: #272d35;
      --border-strong: #3a4149;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #5b8dd9;
      --accent-hover: #7aaae6;
      --accent-subtle: #5b8dd910;
      --link: #6b9ff5;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --strong: #f0f6fc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 18.5px;
      -webkit-font-smoothing: antialiased;
    }

    /* ------ HEADER ------ */
    header {
      border-bottom: 1px solid var(--border-strong);
      padding: 0 28px;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo .mark {
      width: 30px;
      height: 30px;
      border: 2px solid var(--text);
      display: grid;
      place-items: center;
      position: relative;
      flex-shrink: 0;
    }

    .logo .mark::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 2px solid var(--text);
      border-radius: 50%;
    }

    .logo .mark::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      top: 3px;
      right: 3px;
    }

    .logo .t { display: flex; flex-direction: column; line-height: 1.15; }

    .logo .t b {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo .t span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    nav { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }

    nav a, nav button {
      color: var(--text);
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.12s;
    }

    nav a:hover, nav button:hover { border-color: var(--border-strong); background: var(--bg); }

    .theme-toggle { padding: 6px 8px; }

    /* ------ SIDEBAR ------ */
    .sidebar {
      position: fixed;
      left: 0;
      top: var(--header-height);
      bottom: 0;
      width: 290px;
      border-right: 1px solid var(--border-strong);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .search-box {
      flex-shrink: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-box .wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
    }

    .search-box .wrap svg { color: var(--text-muted); flex-shrink: 0; }

    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 16.5px;
      outline: none;
    }

    .search-box input::placeholder { color: var(--text-muted); opacity: 0.8; }

    .sidebar-entries { flex: 1; overflow-y: auto; padding: 6px 0 16px; }

    .date-group {
      margin: 0 14px;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }

    .month-entries .date-group:first-child { border-top: none; }

    .date-label {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }

    .date-label:hover { background: var(--bg); }

    .date-label .num {
      font-family: 'IBM Plex Serif', serif;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .date-label .dow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .date-label .rel {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .date-label .rel.today { color: var(--accent); }

    .date-label .chevron {
      transition: transform 0.2s;
      opacity: 0.5;
      flex-shrink: 0;
      margin-left: 4px;
    }

    .date-group.collapsed .chevron { transform: rotate(-90deg); }

    .date-files {
      overflow: hidden;
      transition: max-height 0.2s ease;
      padding: 4px 0;
    }

    .date-group.collapsed .date-files { max-height: 0 !important; padding: 0; }

    .file-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px 6px 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      border-radius: 4px;
      margin: 1px 0;
      transition: background 0.1s;
      position: relative;
    }

    .file-link::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border-strong);
      flex-shrink: 0;
    }

    .file-link:hover { background: var(--bg); }

    .file-link.active { background: var(--accent-subtle); font-weight: 500; }
    .file-link.active::before { background: var(--accent); }

    .file-link .lbl { flex: 1; }

    .file-link .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.04em;
      font-weight: 500;
      flex-shrink: 0;
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 1px 5px;
    }

    .badge-daily { color: var(--accent); border-color: var(--accent); }
    .badge-weekly { color: var(--orange); border-color: var(--orange); }

    /* ------ MAIN ------ */
    .main {
      margin-left: 290px;
      padding: 56px 72px 96px;
      min-height: calc(100vh - var(--header-height));
    }

    #content { max-width: 720px; }

    #content h1 {
      font-family: 'IBM Plex Serif', serif;
      font-weight: 500;
      font-size: 35px;
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 1.5rem;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--text);
    }

    #content h2 {
      font-family: 'IBM Plex Serif', serif;
      font-weight: 500;
      font-size: 28px;
      letter-spacing: -0.015em;
      line-height: 1.2;
      color: var(--text);
      margin: 2.75rem 0 1rem;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-strong);
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    #content h2::before {
      content: "§";
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    #content h3 {
      font-family: 'IBM Plex Serif', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--text);
      margin: 1.75rem 0 0.5rem;
    }

    #content p { margin-bottom: 1rem; line-height: 1.7; }
    #content a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: color 0.12s;
    }
    #content a:hover { color: var(--accent-hover); }
    #content ul, #content ol { padding-left: 1.4rem; margin-bottom: 1rem; }
    #content li { margin-bottom: 0.5rem; line-height: 1.7; }
    #content strong { color: var(--strong); font-weight: 600; }
    #content code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.88em;
      background: var(--surface);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    #content pre {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--surface);
      padding: 1.1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.1rem;
      border: 1px solid var(--border);
    }
    #content pre code { background: none; padding: 0; border: none; }
    #content blockquote {
      border-left: 2px solid var(--accent);
      padding: 0.25rem 0 0.25rem 1.1rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-style: italic;
      font-family: 'IBM Plex Serif', serif;
      font-size: 20px;
    }
    #content hr { border: none; border-top: 1px solid var(--border-strong); margin: 2rem 0; }

    .ai-disclaimer {
      margin-top: 4rem;
      padding-top: 18px;
      border-top: 1px solid var(--text);
      font-family: 'IBM Plex Serif', serif;
      font-style: italic;
      font-size: 15.5px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .ai-disclaimer a { color: var(--text-muted); text-decoration: underline; }
    .ai-disclaimer a:hover { color: var(--link); }

    .welcome {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }

    .welcome h1 {
      font-family: 'IBM Plex Serif', serif;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--accent);
      border: none;
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .welcome p { font-size: 1rem; line-height: 1.7; }

    .loading { color: var(--text-muted); padding: 2rem; text-align: center; font-size: 0.9rem; }

    .search-results-info {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0.25rem 1rem 0.5rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    .date-group.hidden { display: none; }

    .month-group { margin-bottom: 10px; }

    .month-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 14px 20px 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }

    .month-label:hover { color: var(--text); }

    .month-label .chevron {
      transition: transform 0.2s;
      opacity: 0.6;
      flex-shrink: 0;
    }

    .month-group.collapsed .month-label .chevron { transform: rotate(-90deg); }

    .month-entries { display: block; }
    .month-group.collapsed .month-entries { display: none; }
    .month-group.hidden { display: none; }

    @media (max-width: 768px) {
      .sidebar {
        position: static;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border-strong);
        max-height: 40vh;
      }
      .main { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>
<body>

    </a>
    <nav>
      <a href="feed.xml" title="RSS Feed">

      <button id="langToggle" title="Switch language" style="border-color:var(--border-strong)!important">EN</button>

      </button>
    </nav>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="loading" id="sidebarLoading">Loading…</div>
  </div>

  <div class="main">
    <div id="content">
      <div class="welcome" id="welcomeScreen">
        <h1 id="welcomeTitle">AI Safety Daily Digest</h1>
        <p id="welcomeSub">Daily digest of AI safety research, policy, and developments.</p>
        <p id="welcomeHint" style="margin-top: 1rem; font-size: 0.9rem;">Select a digest from the sidebar to begin reading.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // i18n strings
    const I18N = {
      en: {
        disclaimer: 'AI Safety Radar is an automated digest and may contain errors. Always consult the original sources for accuracy. This is a research tool, not an official publication, and content does not reflect the views of the National Research Council or the Government of Canada.',
        loading: 'Loading digest list...',
        noDigests: 'No digests available yet.<br>Run the pipeline to generate the first digest.',
        loadingContent: 'Loading...',
        failedLoad: 'Failed to load digest.',
        searchPlaceholder: 'Search digests...',
        resultsFound: (n) => `${n} result${n !== 1 ? 's' : ''} found`,
        welcomeTitle: 'AI Safety Radar',
        welcomeSub: 'Daily digest of AI safety research, policy, and developments.',
        welcomeHint: 'Select a digest from the sidebar to begin reading.',
        fileLabels: {
          'safety-daily': 'Daily Digest',
          'safety-weekly': 'Past Week',
          'safety-research': 'Research Papers',
          'safety-analysis': 'Blogs & News',
          'safety-community': 'Community & Tools',
          // Legacy labels for older digests
          'safety-arxiv': 'ArXiv Papers',
          'safety-github': 'GitHub Activity',
          'safety-rss': 'Blog Posts',
          'safety-aisi': 'AI Safety Institutes',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Journal Articles',
        },
        badges: { daily: 'Executive Summary', weekly: 'Weekly Rollup' },
        locale: 'en-US',
        siteTitle: 'AI Safety',
        siteTitleSub: 'Radar',
      },
      fr: {
        disclaimer: 'Le Radar de la Sécurité de l\'IA est un bulletin automatisé et peut contenir des erreurs. Consultez toujours les sources originales pour plus de précision. Il s\'agit d\'un outil de recherche, non d\'une publication officielle, et son contenu ne reflète pas les opinions du Conseil national de recherches ou du gouvernement du Canada.',
        loading: 'Chargement de la liste...',
        noDigests: 'Aucun bulletin disponible pour l\'instant.<br>Lancez le pipeline pour générer le premier bulletin.',
        loadingContent: 'Chargement...',
        failedLoad: 'Impossible de charger le bulletin.',
        searchPlaceholder: 'Rechercher...',
        resultsFound: (n) => `${n} résultat${n !== 1 ? 's' : ''} trouvé${n !== 1 ? 's' : ''}`,
        welcomeTitle: 'Sécurité de l\'IA - Radar',
        welcomeSub: 'Synthèse quotidienne de la recherche, des politiques et des développements en matière de sécurité de l\'IA.',
        welcomeHint: 'Sélectionnez un bulletin dans la barre latérale pour commencer à lire.',
        fileLabels: {
          'safety-daily': 'Bulletin quotidien',
          'safety-weekly': 'Résumé hebdomadaire',
          'safety-research': 'Articles de recherche',
          'safety-analysis': 'Blogues et actualités',
          'safety-community': 'Communauté et outils',
          // Legacy labels for older digests
          'safety-arxiv': 'Articles ArXiv',
          'safety-github': 'Activité GitHub',
          'safety-rss': 'Articles de blogue',
          'safety-aisi': 'Instituts de sécurité de l\'IA',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Articles scientifiques',
        },
        badges: { daily: 'Résumé exécutif', weekly: 'hebdo' },
        locale: 'fr-CA',
        siteTitle: 'Sécurité de l\'IA -',
        siteTitleSub: 'Radar',
      },
    };

    // Language management
    function getLang() {
      return localStorage.getItem('lang') || 'en';
    }

    function t() {
      return I18N[getLang()];
    }

    function applyLang(lang) {
      const strings = I18N[lang];
      document.getElementById('langToggle').textContent = lang === 'en' ? 'FR' : 'EN';
      const welcomeTitle = document.getElementById('welcomeTitle');
      const welcomeSub = document.getElementById('welcomeSub');
      const welcomeHint = document.getElementById('welcomeHint');
      if (welcomeTitle) welcomeTitle.textContent = strings.welcomeTitle;
      if (welcomeSub) welcomeSub.textContent = strings.welcomeSub;
      if (welcomeHint) welcomeHint.textContent = strings.welcomeHint;
      const logoTitle = document.getElementById('logoTitle');
      const logoSub = document.getElementById('logoSub');
      if (logoTitle) logoTitle.textContent = lang === 'en' ? 'AI Safety Radar' : 'Sécurité IA — Radar';
      if (logoSub) logoSub.textContent = lang === 'en' ? 'Daily digest' : 'Bulletin quotidien';
    }

    function hashForLang(hash, lang) {
      if (!hash) return hash;
      if (lang === 'fr') {
        // Switch to .fr.md version
        return hash.endsWith('.fr.md') ? hash : hash.replace('.md', '.fr.md');
      } else {
        // Switch to .md version
        return hash.replace('.fr.md', '.md');
      }
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      const next = getLang() === 'en' ? 'fr' : 'en';
      localStorage.setItem('lang', next);
      applyLang(next);
      if (currentManifest) renderSidebar(currentManifest);
      const hash = location.hash.slice(1);
      if (hash) {
        const newHash = hashForLang(hash, next);
        // Update URL silently then load content
        history.replaceState(null, '', '#' + newHash);
        loadContent(newHash);
      }
    });

    // Cache loaded content for search
    const contentCache = {};

    // Theme management
    function getTheme() {
      return localStorage.getItem('theme') || 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('iconSun').style.display = theme === 'dark' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark' ? 'none' : 'block';
    }

    applyTheme(getTheme());

    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = getTheme() === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });

    // Sort files: daily/weekly first, then alphabetical
    function sortFiles(files) {
      const priority = { 'weekly': 0, 'daily': 1, 'research': 2 };
      return [...files].sort((a, b) => {
        const pa = Object.entries(priority).find(([k]) => a.includes(k));
        const pb = Object.entries(priority).find(([k]) => b.includes(k));
        const va = pa ? pa[1] : 99;
        const vb = pb ? pb[1] : 99;
        if (va !== vb) return va - vb;
        return a.localeCompare(b);
      });
    }

    function filterFilesByLang(files) {
      const lang = getLang();
      if (lang === 'fr') {
        // For each EN file, show its .fr.md if it exists, otherwise show the EN file
        return files
          .filter(f => !f.endsWith('.fr.md'))
          .map(f => files.includes(f.replace('.md', '.fr.md')) ? f.replace('.md', '.fr.md') : f);
      } else {
        return files.filter(f => !f.endsWith('.fr.md'));
      }
    }

    function fileLabel(filename) {
      const map = t().fileLabels;
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.fr\.md$/, '').replace('.md', '');
    }

    function fileBadge(filename) {
      if (filename.includes('daily')) return `<span class="badge badge-daily">${t().badges.daily}</span>`;
      if (filename.includes('weekly')) return `<span class="badge badge-weekly">${t().badges.weekly}</span>`;
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    let currentManifest = null;

    function monthKey(date) {
      return date.slice(0, 7); // "YYYY-MM"
    }

    function monthLabel(ym) {
      const [y, m] = ym.split('-');
      return new Date(+y, +m - 1, 1).toLocaleDateString(t().locale, { month: 'long', year: 'numeric' });
    }

    function renderSidebar(manifest) {
      currentManifest = manifest;
      const sidebar = document.getElementById('sidebar');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = `<div class="loading">${t().noDigests}</div>`;
        return;
      }

      // Group entries by month
      const months = [];
      const monthMap = {};
      for (const entry of manifest.entries) {
        const mk = monthKey(entry.date);
        if (!monthMap[mk]) { monthMap[mk] = []; months.push(mk); }
        monthMap[mk].push(entry);
      }

      const chevronSvg = `<svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

      let html = `<div class="search-box"><div class="wrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><input type="text" id="searchInput" placeholder="${t().searchPlaceholder}"></div></div>`;
      html += '<div class="sidebar-entries" id="sidebarEntries">';

      months.forEach((mk, mi) => {
        const monthCollapsed = mi > 0 ? ' collapsed' : '';
        html += `<div class="month-group${monthCollapsed}" data-month="${mk}">`;
        html += `<div class="month-label"><span>${monthLabel(mk)}</span>${chevronSvg}</div>`;

        const entriesHtml = monthMap[mk].map((entry, i) => {
          const sorted = sortFiles(filterFilesByLang(entry.files));
          const dayCollapsed = (mi === 0 && i === 0) ? '' : ' collapsed';
          const filesHtml = sorted.map(file =>
            `<a href="#${file}" class="file-link" data-hash="${file}" data-label="${fileLabel(file).toLowerCase()}" data-date="${entry.date}"><span class="lbl">${fileLabel(file)}</span>${fileBadge(file)}</a>`
          ).join('');
          const filesHeight = sorted.length * 42;
          const d = new Date(entry.date + 'T12:00:00');
          const lang = getLang();
          const dayNum = d.getDate();
          const dow = d.toLocaleDateString(lang === 'fr' ? 'fr-CA' : 'en-US', { weekday: 'short' }).replace('.', '');
          const today = new Date(); today.setHours(0,0,0,0);
          const dCopy = new Date(d); dCopy.setHours(0,0,0,0);
          const diffDays = Math.round((today - dCopy) / 86400000);
          let relText = '', relClass = '';
          if (diffDays === 0) { relText = lang === 'fr' ? "auj." : "today"; relClass = 'today'; }
          else if (diffDays > 0 && diffDays < 60) { relText = diffDays + (lang === 'fr' ? 'j' : 'd'); }
          return `<div class="date-group${dayCollapsed}" data-date="${entry.date}">
            <div class="date-label">
              <span class="num">${dayNum}</span>
              <span class="dow">${dow}</span>
              ${relText ? `<span class="rel ${relClass}">${relText}</span>` : ''}
              ${chevronSvg}
            </div>
            <div class="date-files" style="max-height:${dayCollapsed ? 0 : filesHeight}px">${filesHtml}</div>
          </div>`;
        }).join('');

        html += `<div class="month-entries">${entriesHtml}</div>`;
        html += '</div>';
      });

      html += '</div>';
      sidebar.innerHTML = html;

      // Wire up month collapsing
      document.querySelectorAll('.month-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.month-group');
          group.classList.toggle('collapsed');
        });
      });

      // Wire up day collapsing
      document.querySelectorAll('.date-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.date-group');
          const files = group.querySelector('.date-files');
          const isCollapsed = group.classList.toggle('collapsed');
          files.style.maxHeight = isCollapsed ? '0px' : files.scrollHeight + 'px';
        });
      });

      // Wire up search
      document.getElementById('searchInput').addEventListener('input', handleSearch);
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const monthGroups = document.querySelectorAll('.month-group');
      const dateGroups = document.querySelectorAll('.date-group');

      if (!query) {
        // Restore original state: first month expanded, first day expanded, rest collapsed
        monthGroups.forEach((mg, mi) => {
          mg.classList.remove('hidden');
          mg.classList.toggle('collapsed', mi > 0);
        });
        dateGroups.forEach((dg, di) => {
          dg.classList.remove('hidden');
          dg.classList.toggle('collapsed', di > 0);
          const files = dg.querySelector('.date-files');
          if (files) files.style.maxHeight = di > 0 ? '0px' : files.scrollHeight + 'px';
        });
        document.querySelectorAll('.file-link').forEach(l => l.style.display = '');
        const info = document.querySelector('.search-results-info');
        if (info) info.remove();
        return;
      }

      let totalMatches = 0;
      dateGroups.forEach(group => {
        const date = group.dataset.date;
        const links = group.querySelectorAll('.file-link');
        let groupHasMatch = false;

        links.forEach(link => {
          const label = link.dataset.label;
          const file = link.dataset.hash;
          const cached = contentCache[file] || '';
          const matches = date.includes(query) || label.includes(query) || cached.toLowerCase().includes(query);
          link.style.display = matches ? '' : 'none';
          if (matches) { groupHasMatch = true; totalMatches++; }
        });

        group.classList.toggle('hidden', !groupHasMatch);
        if (groupHasMatch) {
          group.classList.remove('collapsed');
          const files = group.querySelector('.date-files');
          if (files) files.style.maxHeight = files.scrollHeight + 'px';
        }
      });

      // Show/hide month groups based on whether any day inside matches
      monthGroups.forEach(mg => {
        const hasVisible = [...mg.querySelectorAll('.date-group')].some(dg => !dg.classList.contains('hidden'));
        mg.classList.toggle('hidden', !hasVisible);
        if (hasVisible) {
          mg.classList.remove('collapsed');
        }
      });

      // Show count
      let info = document.querySelector('.search-results-info');
      if (!info) {
        info = document.createElement('div');
        info.className = 'search-results-info';
        document.getElementById('sidebarEntries').prepend(info);
      }
      info.textContent = t().resultsFound(totalMatches);
    }

    async function loadContent(file) {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="loading">${t().loadingContent}</div>`;

      try {
        const res = await fetch(`digests/${file}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        contentCache[file] = md;
        content.innerHTML = marked.parse(md) + `<div class="ai-disclaimer">${t().disclaimer}</div>`;
      } catch {
        content.innerHTML = `<div class="loading">${t().failedLoad}</div>`;
      }

      document.querySelectorAll('.file-link').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === file);
      });
    }

    // Preload content for search indexing
    async function preloadContent(manifest) {
      for (const entry of manifest.entries) {
        for (const file of entry.files) {
          if (contentCache[file]) continue;
          try {
            const res = await fetch(`digests/${file}`);
            if (res.ok) contentCache[file] = await res.text();
          } catch {}
        }
      }
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
    }

    async function init() {
      applyLang(getLang());
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();

      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const sorted = sortFiles(filterFilesByLang(latest.files));
        if (sorted.length > 0) location.hash = sorted[0];
      }

      // Preload in background for search
      preloadContent(manifest);
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
