<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Daily Brief</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" href="assets/shield.png">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Daily Brief RSS" href="feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f5f7;
      --border: #e2e5e9;
      --text: #0f1117;
      --text-muted: #6b7280;
      --accent: #11568C;
      --accent-hover: #002740;
      --accent-subtle: #11568C0d;
      --green: #1a6b39;
      --orange: #b45309;
      --red: #b91c1c;
      --strong: #0f1117;
      --header-height: 56px;
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #272d35;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #007D7F;
      --accent-hover: #11568C;
      --accent-subtle: #007D7F10;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --strong: #f0f6fc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Geist', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }

    .logo span { color: var(--text); }

    nav { display: flex; gap: 1.25rem; align-items: center; }

    nav a, nav button {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }

    nav a:hover, nav button:hover { color: var(--accent); }

    .theme-toggle {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      padding: 0;
      text-transform: none;
      letter-spacing: 0;
    }

    .theme-toggle:hover { background: var(--accent-subtle); }

    .sidebar {
      position: fixed;
      left: 0;
      top: var(--header-height);
      bottom: 0;
      width: 260px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .search-box {
      flex-shrink: 0;
      padding: 1.25rem 1rem 0.875rem;
      border-bottom: 1px solid var(--border);
    }

    .search-box input {
      width: 100%;
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box input::placeholder { color: var(--text-muted); }
    .search-box input:focus { border-color: var(--accent); }

    .sidebar-entries {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0.75rem 1.5rem;
    }

    .date-group { margin-bottom: 0.25rem; }

    .date-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0.35rem 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 3px;
      user-select: none;
      transition: background 0.1s, color 0.1s;
    }

    .date-label:hover { background: var(--surface); color: var(--text); }

    .date-label .chevron {
      transition: transform 0.2s;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .date-group.collapsed .chevron { transform: rotate(-90deg); }

    .date-files {
      overflow: hidden;
      transition: max-height 0.2s ease;
    }

    .date-group.collapsed .date-files {
      max-height: 0 !important;
    }

    .file-link {
      display: block;
      padding: 0.3rem 0.5rem 0.3rem 0.875rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
      border-left: 2px solid transparent;
    }

    .file-link:hover {
      background: var(--accent-subtle);
      color: var(--text);
      border-left-color: var(--border);
    }

    .file-link.active {
      background: var(--accent-subtle);
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 500;
    }

    .file-link .badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 2px;
      margin-left: 0.3rem;
      vertical-align: middle;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-daily { background: var(--green); color: #fff; }
    .badge-weekly { background: var(--orange); color: #fff; }
    .badge-arxiv { background: #6d3bb5; color: #fff; }

    .main {
      margin-left: 260px;
      padding: 2.5rem 3rem;
      min-height: calc(100vh - var(--header-height));
    }

    #content { max-width: 780px; }

    #content h1 {
      font-family: 'Geist', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1.25rem;
      line-height: 1.25;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--accent);
      color: var(--strong);
    }

    #content h2 {
      font-family: 'Geist', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin: 2rem 0 0.75rem;
      color: var(--accent);
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }

    #content h3 {
      font-family: 'Geist', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      margin: 1.25rem 0 0.5rem;
      color: var(--strong);
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }

    #content p { margin-bottom: 0.875rem; line-height: 1.75; }
    #content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-subtle); transition: border-color 0.15s; }
    #content a:hover { border-bottom-color: var(--accent); }
    #content ul, #content ol { padding-left: 1.5rem; margin-bottom: 0.875rem; }
    #content li { margin-bottom: 0.4rem; line-height: 1.7; }
    #content code { background: var(--surface); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.875em; border: 1px solid var(--border); }
    #content pre { background: var(--surface); padding: 1.25rem; border-radius: 4px; overflow-x: auto; margin-bottom: 1.25rem; border: 1px solid var(--border); }
    #content pre code { background: none; padding: 0; border: none; }
    #content blockquote { border-left: 3px solid var(--accent); padding: 0.25rem 0 0.25rem 1.25rem; color: var(--text-muted); margin-bottom: 0.875rem; font-style: italic; }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    #content strong { color: var(--strong); font-weight: 600; }

    .ai-disclaimer {
      margin-top: 3rem;
      padding: 0.875rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .ai-disclaimer a { color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .ai-disclaimer a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    .welcome {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }

    .welcome h1 {
      font-family: 'Geist', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: var(--accent);
      border: none;
      font-size: 2.25rem;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .welcome p { font-size: 1.05rem; line-height: 1.7; }

    .loading { color: var(--text-muted); padding: 2rem; text-align: center; font-size: 0.9rem; }

    .search-results-info {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0.25rem 0.5rem 0.5rem;
    }

    .date-group.hidden { display: none; }

    @media (max-width: 768px) {
      .sidebar {
        position: static;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
      .main { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo"><img src="assets/shield.png" alt="" width="32" height="32" style="vertical-align: -7px; margin-right: 8px;">AI Safety <span>Daily Brief</span></a>
    <nav>
      <a href="feed.xml">RSS</a>
      <a href="https://github.com/ygauthie/ai-safety-daily-brief">GitHub</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="loading">Loading digest list...</div>
  </div>

  <div class="main">
    <div id="content">
      <div class="welcome">
        <h1>AI Safety Daily Brief</h1>
        <p>Daily digest of AI safety research, policy, and developments.</p>
        <p style="margin-top: 1rem; font-size: 0.9rem;">Select a digest from the sidebar to begin reading.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const AI_DISCLAIMER = '<div class="ai-disclaimer">Generated by <a href="https://github.com/ygauthie/ai-safety-daily-brief">AI Safety Daily Brief</a>. These summaries are AI-generated and may contain errors. Always refer to the original sources for accuracy.</div>';

    // Cache loaded content for search
    const contentCache = {};

    // Theme management
    function getTheme() {
      return localStorage.getItem('theme') || 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('iconSun').style.display = theme === 'dark' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark' ? 'none' : 'block';
    }

    applyTheme(getTheme());

    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = getTheme() === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });

    // Sort files: daily/weekly first, then alphabetical
    function sortFiles(files) {
      const priority = { 'weekly': 0, 'daily': 1 };
      return [...files].sort((a, b) => {
        const pa = Object.entries(priority).find(([k]) => a.includes(k));
        const pb = Object.entries(priority).find(([k]) => b.includes(k));
        const va = pa ? pa[1] : 99;
        const vb = pb ? pb[1] : 99;
        if (va !== vb) return va - vb;
        return a.localeCompare(b);
      });
    }

    function fileLabel(filename) {
      const map = {
        'safety-daily': 'AI Safety Brief',
        'safety-weekly': 'Weekly Summary',
        'safety-arxiv': 'ArXiv Papers',
        'safety-github': 'GitHub',
        'safety-rss': 'Blog Posts',
        'safety-web': 'Org Updates',
        'safety-aisi': 'AI Safety Institutes',
        'safety-hn': 'Hacker News',
      };
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace('.md', '');
    }

    function fileBadge(filename) {
      if (filename.includes('daily')) return '<span class="badge badge-daily">daily</span>';
      if (filename.includes('weekly')) return '<span class="badge badge-weekly">weekly</span>';
      if (filename.includes('arxiv')) return '<span class="badge badge-arxiv">arxiv</span>';
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    let currentManifest = null;

    function renderSidebar(manifest) {
      currentManifest = manifest;
      const sidebar = document.getElementById('sidebar');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = '<div class="loading">No digests available yet.<br>Run the pipeline to generate the first digest.</div>';
        return;
      }

      let html = '<div class="search-box"><input type="text" id="searchInput" placeholder="Search briefs..."></div>';
      html += '<div class="sidebar-entries" id="sidebarEntries">';
      manifest.entries.forEach((entry, i) => {
        const sorted = sortFiles(entry.files);
        const collapsed = i > 0 ? ' collapsed' : '';
        const filesHtml = sorted.map(file =>
          `<a href="#${file}" class="file-link" data-hash="${file}" data-label="${fileLabel(file).toLowerCase()}">${fileLabel(file)}${fileBadge(file)}</a>`
        ).join('');
        const filesHeight = sorted.length * 32;
        html += `<div class="date-group${collapsed}" data-date="${entry.date}">`;
        html += `<div class="date-label">
          <span>${entry.date}</span>
          <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>`;
        html += `<div class="date-files" style="max-height:${filesHeight}px">${filesHtml}</div>`;
        html += '</div>';
      });
      html += '</div>';
      sidebar.innerHTML = html;

      // Wire up collapsing
      document.querySelectorAll('.date-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.date-group');
          const files = group.querySelector('.date-files');
          const isCollapsed = group.classList.toggle('collapsed');
          if (!isCollapsed) files.style.maxHeight = files.scrollHeight + 'px';
        });
      });

      // Wire up search
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', handleSearch);
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const groups = document.querySelectorAll('.date-group');

      if (!query) {
        groups.forEach(g => {
          g.classList.remove('hidden');
          // Restore original collapsed state (only first group expanded)
          const isFirst = !g.previousElementSibling || g.previousElementSibling.classList.contains('search-results-info');
          g.classList.toggle('collapsed', !isFirst);
          const files = g.querySelector('.date-files');
          if (files) files.style.maxHeight = isFirst ? files.scrollHeight + 'px' : '0px';
        });
        document.querySelectorAll('.file-link').forEach(l => l.style.display = '');
        const info = document.querySelector('.search-results-info');
        if (info) info.remove();
        return;
      }

      let totalMatches = 0;
      groups.forEach(group => {
        const date = group.dataset.date;
        const links = group.querySelectorAll('.file-link');
        let groupHasMatch = false;

        links.forEach(link => {
          const label = link.dataset.label;
          const file = link.dataset.hash;
          const cached = contentCache[file] || '';
          const matches = date.includes(query) || label.includes(query) || cached.toLowerCase().includes(query);
          link.style.display = matches ? '' : 'none';
          if (matches) { groupHasMatch = true; totalMatches++; }
        });

        group.classList.toggle('hidden', !groupHasMatch);
        // Auto-expand groups with matches
        if (groupHasMatch) {
          group.classList.remove('collapsed');
          const files = group.querySelector('.date-files');
          if (files) files.style.maxHeight = files.scrollHeight + 'px';
        }
      });

      // Show count
      let info = document.querySelector('.search-results-info');
      if (!info) {
        info = document.createElement('div');
        info.className = 'search-results-info';
        document.getElementById('sidebarEntries').prepend(info);
      }
      info.textContent = `${totalMatches} result${totalMatches !== 1 ? 's' : ''} found`;
    }

    async function loadContent(file) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`digests/${file}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        contentCache[file] = md;
        content.innerHTML = marked.parse(md) + AI_DISCLAIMER;
      } catch {
        content.innerHTML = '<div class="loading">Failed to load digest.</div>';
      }

      document.querySelectorAll('.file-link').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === file);
      });
    }

    // Preload content for search indexing
    async function preloadContent(manifest) {
      for (const entry of manifest.entries) {
        for (const file of entry.files) {
          if (contentCache[file]) continue;
          try {
            const res = await fetch(`digests/${file}`);
            if (res.ok) contentCache[file] = await res.text();
          } catch {}
        }
      }
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
    }

    async function init() {
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();

      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const sorted = sortFiles(latest.files);
        location.hash = sorted[0];
      }

      // Preload in background for search
      preloadContent(manifest);
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
