<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Radar</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Radar RSS" href="feed.xml">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d1d9e0;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --accent-subtle: #0969da11;
      --green: #1a7f37;
      --orange: #9a6700;
      --red: #d1242f;
      --strong: #000;
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-subtle: #1f6feb22;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --strong: #fff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    .logo span { color: var(--text); }

    nav { display: flex; gap: 1rem; align-items: center; }

    nav a, nav button {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    nav a:hover, nav button:hover { color: var(--accent); }

    .theme-toggle {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 0;
    }

    .theme-toggle:hover { background: var(--accent-subtle); }

    .sidebar {
      position: fixed;
      left: 0;
      top: 52px;
      bottom: 0;
      width: 260px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .search-box {
      flex-shrink: 0;
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-entries {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 1rem 1rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }

    .search-box input::placeholder { color: var(--text-muted); }
    .search-box input:focus { border-color: var(--accent); }

    .main {
      margin-left: 260px;
      padding: 2rem;
      min-height: calc(100vh - 52px);
    }

    .date-group { margin-bottom: 1rem; }

    .date-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0.3rem 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .file-link {
      display: block;
      padding: 0.3rem 0.5rem 0.3rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      border-radius: 4px;
    }

    .file-link:hover, .file-link.active {
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .file-link .badge {
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    .badge-daily { background: var(--green); color: #fff; }
    .badge-weekly { background: var(--orange); color: #fff; }
    .badge-arxiv { background: #8957e5; color: #fff; }

    #content { max-width: 800px; }
    #content h1 { font-size: 1.8rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    #content h2 { font-size: 1.4rem; margin: 1.5rem 0 0.75rem; color: var(--accent); }
    #content h3 { font-size: 1.1rem; margin: 1rem 0 0.5rem; }
    #content p { margin-bottom: 0.75rem; }
    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }
    #content ul, #content ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    #content li { margin-bottom: 0.3rem; }
    #content code { background: var(--surface); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
    #content pre { background: var(--surface); padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; }
    #content pre code { background: none; padding: 0; }
    #content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    #content strong { color: var(--strong); }

    .ai-disclaimer {
      margin-top: 2rem;
      padding: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .welcome {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .welcome h1 {
      color: var(--accent);
      border: none;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .welcome p { font-size: 1.1rem; }

    .loading { color: var(--text-muted); padding: 2rem; text-align: center; }

    .search-results-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 0.3rem 0.5rem;
      font-style: italic;
    }

    .date-group.hidden { display: none; }

    @media (max-width: 768px) {
      .sidebar {
        position: static;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo">📡 AI Safety <span>Radar</span></a>
    <nav>
      <a href="feed.xml">RSS</a>
      <a href="https://github.com/ygauthie/ai-safety-radar">GitHub</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="loading">Loading digest list...</div>
  </div>

  <div class="main">
    <div id="content">
      <div class="welcome">
        <h1>AI Safety Radar</h1>
        <p>Daily digest of AI safety research, policy, and developments.</p>
        <p style="margin-top: 1rem; font-size: 0.9rem;">Select a digest from the sidebar to begin reading.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const AI_DISCLAIMER = '<div class="ai-disclaimer">These summaries are AI-generated and may contain errors. Always refer to the original sources for accuracy.</div>';

    // Cache loaded content for search
    const contentCache = {};

    // Theme management
    function getTheme() {
      return localStorage.getItem('theme') || 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('iconSun').style.display = theme === 'dark' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark' ? 'none' : 'block';
    }

    applyTheme(getTheme());

    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = getTheme() === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });

    // Sort files: daily/weekly first, then alphabetical
    function sortFiles(files) {
      const priority = { 'daily': 0, 'weekly': 1 };
      return [...files].sort((a, b) => {
        const pa = Object.entries(priority).find(([k]) => a.includes(k));
        const pb = Object.entries(priority).find(([k]) => b.includes(k));
        const va = pa ? pa[1] : 99;
        const vb = pb ? pb[1] : 99;
        if (va !== vb) return va - vb;
        return a.localeCompare(b);
      });
    }

    function fileLabel(filename) {
      const map = {
        'safety-daily': 'Daily Summary',
        'safety-weekly': 'Weekly Summary',
        'safety-arxiv': 'ArXiv Papers',
        'safety-github': 'GitHub',
        'safety-rss': 'Blog Posts',
        'safety-web': 'Org Updates',
        'safety-hn': 'Hacker News',
      };
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace('.md', '');
    }

    function fileBadge(filename) {
      if (filename.includes('daily')) return '<span class="badge badge-daily">daily</span>';
      if (filename.includes('weekly')) return '<span class="badge badge-weekly">weekly</span>';
      if (filename.includes('arxiv')) return '<span class="badge badge-arxiv">arxiv</span>';
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    let currentManifest = null;

    function renderSidebar(manifest) {
      currentManifest = manifest;
      const sidebar = document.getElementById('sidebar');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = '<div class="loading">No digests available yet.<br>Run the pipeline to generate the first digest.</div>';
        return;
      }

      let html = '<div class="search-box"><input type="text" id="searchInput" placeholder="Search digests..."></div>';
      html += '<div class="sidebar-entries" id="sidebarEntries">';
      for (const entry of manifest.entries) {
        const sorted = sortFiles(entry.files);
        html += `<div class="date-group" data-date="${entry.date}">`;
        html += `<div class="date-label">${entry.date}</div>`;
        for (const file of sorted) {
          html += `<a href="#${file}" class="file-link" data-hash="${file}" data-label="${fileLabel(file).toLowerCase()}">${fileLabel(file)}${fileBadge(file)}</a>`;
        }
        html += '</div>';
      }
      html += '</div>';
      sidebar.innerHTML = html;

      // Wire up search
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', handleSearch);
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const groups = document.querySelectorAll('.date-group');

      if (!query) {
        groups.forEach(g => g.classList.remove('hidden'));
        document.querySelectorAll('.file-link').forEach(l => l.style.display = '');
        const info = document.querySelector('.search-results-info');
        if (info) info.remove();
        return;
      }

      let totalMatches = 0;
      groups.forEach(group => {
        const date = group.dataset.date;
        const links = group.querySelectorAll('.file-link');
        let groupHasMatch = false;

        links.forEach(link => {
          const label = link.dataset.label;
          const file = link.dataset.hash;
          const cached = contentCache[file] || '';
          const matches = date.includes(query) || label.includes(query) || cached.toLowerCase().includes(query);
          link.style.display = matches ? '' : 'none';
          if (matches) { groupHasMatch = true; totalMatches++; }
        });

        group.classList.toggle('hidden', !groupHasMatch);
      });

      // Show count
      let info = document.querySelector('.search-results-info');
      if (!info) {
        info = document.createElement('div');
        info.className = 'search-results-info';
        document.getElementById('sidebarEntries').prepend(info);
      }
      info.textContent = `${totalMatches} result${totalMatches !== 1 ? 's' : ''} found`;
    }

    async function loadContent(file) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`digests/${file}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        contentCache[file] = md;
        content.innerHTML = marked.parse(md) + AI_DISCLAIMER;
      } catch {
        content.innerHTML = '<div class="loading">Failed to load digest.</div>';
      }

      document.querySelectorAll('.file-link').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === file);
      });
    }

    // Preload content for search indexing
    async function preloadContent(manifest) {
      for (const entry of manifest.entries) {
        for (const file of entry.files) {
          if (contentCache[file]) continue;
          try {
            const res = await fetch(`digests/${file}`);
            if (res.ok) contentCache[file] = await res.text();
          } catch {}
        }
      }
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
    }

    async function init() {
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();

      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const sorted = sortFiles(latest.files);
        location.hash = sorted[0];
      }

      // Preload in background for search
      preloadContent(manifest);
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
