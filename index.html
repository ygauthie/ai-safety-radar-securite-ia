<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Radar</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" href="assets/shield.png">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Radar RSS" href="feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f2f2f2;
      --border: #d9d9d9;
      --text: #333333;
      --text-muted: #4d4d4d;
      --accent: #26374a;
      --accent-hover: #002740;
      --accent-subtle: #26374a0d;
      --link: #1354ec;
      --green: #2a7d4f;
      --orange: #b45309;
      --red: #df2039;
      --strong: #1a1a1a;
      --header-height: 56px;
    }

    [data-theme="dark"] {
      --bg: #101922;
      --surface: #161b22;
      --border: #272d35;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #5b8dd9;
      --accent-hover: #7aaae6;
      --accent-subtle: #5b8dd910;
      --link: #6b9ff5;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --strong: #f0f6fc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Lato', sans-serif;
      font-size: 1.35rem;
      font-weight: 900;
      color: #11568C;
      text-decoration: none;
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    [data-theme="dark"] .logo { color: var(--accent); }
    .logo span span { color: var(--text); }
    

    .header-filler {
      flex: 1;
      margin: 0 0.4rem 0 0.4rem;
      height: 1.03rem;
      background: repeating-linear-gradient(
        90deg,
        var(--text) 0px,
        var(--text) 2px,
        transparent 2px,
        transparent 8px
      );
      -webkit-mask-image: linear-gradient(90deg, black 0%, transparent 80%);
      mask-image: linear-gradient(90deg, black 0%, transparent 80%);
    }

    nav { display: flex; gap: 1.25rem; align-items: center; flex-shrink: 0; }

    nav a, nav button {
      color: var(--text);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }

    nav a:hover, nav button:hover { color: var(--accent); }

    .theme-toggle {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      padding: 0;
      text-transform: none;
      letter-spacing: 0;
    }

    .theme-toggle:hover { background: var(--accent-subtle); }

    .sidebar {
      position: fixed;
      left: 0;
      top: var(--header-height);
      bottom: 0;
      width: 300px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .search-box {
      flex-shrink: 0;
      padding: 1.25rem 1rem 0.875rem;
      border-bottom: 1px solid var(--border);
    }

    .search-box input {
      width: 100%;
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box input::placeholder { color: var(--text-muted); }
    .search-box input:focus { border-color: var(--accent); }

    .sidebar-entries {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0.75rem 1.5rem;
    }

    .date-group { margin-bottom: 0.25rem; }

    .date-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0.35rem 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 3px;
      user-select: none;
      transition: background 0.1s, color 0.1s;
    }

    .date-label:hover { background: var(--surface); color: var(--text); }

    .date-label .chevron {
      transition: transform 0.2s;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .date-group.collapsed .chevron { transform: rotate(-90deg); }

    .date-files {
      overflow: hidden;
      transition: max-height 0.2s ease;
    }

    .date-group.collapsed .date-files {
      max-height: 0 !important;
    }

    .file-link {
      display: block;
      padding: 0.3rem 0.4rem 0.3rem 0.75rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
      border-left: 2px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-link:hover {
      background: var(--accent-subtle);
      color: var(--text);
      border-left-color: var(--border);
    }

    .file-link.active {
      background: var(--accent-subtle);
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 500;
    }

    .file-link .badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 2px;
      margin-left: 0.3rem;
      vertical-align: middle;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-daily { background: var(--green); color: #fff; }
    .badge-weekly { background: var(--orange); color: #fff; }
    .badge-arxiv { background: #6d3bb5; color: #fff; }

    .main {
      margin-left: 300px;
      padding: 2.5rem 3rem;
      min-height: calc(100vh - var(--header-height));
    }

    #content { max-width: 780px; }

    #content h1 {
      font-family: 'Lato', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      line-height: 1.25;
      letter-spacing: -0.01em;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--accent);
      color: var(--strong);
    }

    #content h2 {
      font-family: 'Lato', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin: 2rem 0 0.75rem;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    #content h3 {
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      margin: 1.25rem 0 0.5rem;
      color: var(--strong);
      letter-spacing: -0.01em;
    }

    #content p { margin-bottom: 0.875rem; line-height: 1.75; }
    #content a { color: var(--link); text-decoration: underline; transition: color 0.15s; }
    #content a:hover { color: var(--accent); }
    #content ul, #content ol { padding-left: 1.5rem; margin-bottom: 0.875rem; }
    #content li { margin-bottom: 0.4rem; line-height: 1.7; }
    #content code { background: var(--surface); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.875em; border: 1px solid var(--border); }
    #content pre { background: var(--surface); padding: 1.25rem; border-radius: 4px; overflow-x: auto; margin-bottom: 1.25rem; border: 1px solid var(--border); }
    #content pre code { background: none; padding: 0; border: none; }
    #content blockquote { border-left: 3px solid var(--accent); padding: 0.25rem 0 0.25rem 1.25rem; color: var(--text-muted); margin-bottom: 0.875rem; font-style: italic; }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    #content strong { color: var(--strong); font-weight: 600; }

    .ai-disclaimer {
      margin-top: 3rem;
      padding: 0.875rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .ai-disclaimer a { color: var(--text-muted); text-decoration: underline; }
    .ai-disclaimer a:hover { color: var(--link); }

    .welcome {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }

    .welcome h1 {
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--accent);
      border: none;
      font-size: 2.25rem;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .welcome p { font-size: 1.05rem; line-height: 1.7; }

    .loading { color: var(--text-muted); padding: 2rem; text-align: center; font-size: 0.9rem; }

    .search-results-info {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0.25rem 0.5rem 0.5rem;
    }

    .date-group.hidden { display: none; }

    .month-group { margin-bottom: 0.5rem; }

    .month-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 700;
      padding: 0.4rem 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 3px;
      user-select: none;
      transition: background 0.1s;
      border-bottom: 1px solid var(--border);
    }

    .month-label:hover { background: var(--surface); }

    .month-label .chevron {
      transition: transform 0.2s;
      opacity: 0.6;
      flex-shrink: 0;
    }

    .month-group.collapsed .month-label .chevron { transform: rotate(-90deg); }

    .month-entries {
      display: block;
    }

    .month-group.collapsed .month-entries {
      display: none;
    }

    .month-group.hidden { display: none; }

    @media (max-width: 768px) {
      .sidebar {
        position: static;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
      .main { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo"><span id="logoText">AI Safety <span>Radar</span></span></a>
    <div class="header-filler" id="headerFiller"></div>
    <nav>
      <a href="feed.xml" title="RSS Feed" style="display:flex;align-items:center;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>

      <button id="langToggle" style="font-size:0.8rem;font-weight:600;letter-spacing:0.04em;padding:2px 7px;border:1px solid var(--border);border-radius:3px;background:none;color:var(--text);cursor:pointer;font-family:inherit;transition:color 0.15s,border-color 0.15s;" title="Switch language">EN</button>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="loading" id="sidebarLoading">Loading…</div>
  </div>

  <div class="main">
    <div id="content">
      <div class="welcome" id="welcomeScreen">
        <h1 id="welcomeTitle">AI Safety Daily Brief</h1>
        <p id="welcomeSub">Daily digest of AI safety research, policy, and developments.</p>
        <p id="welcomeHint" style="margin-top: 1rem; font-size: 0.9rem;">Select a digest from the sidebar to begin reading.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // i18n strings
    const I18N = {
      en: {
        disclaimer: 'AI Safety Radar is a fully automated digest and may contain errors. Always consult the original sources for accuracy. This is a personal project, not an official publication, and content does not reflect the views of the National Research Council or the Government of Canada.',
        loading: 'Loading digest list...',
        noDigests: 'No digests available yet.<br>Run the pipeline to generate the first digest.',
        loadingContent: 'Loading...',
        failedLoad: 'Failed to load digest.',
        searchPlaceholder: 'Search briefs...',
        resultsFound: (n) => `${n} result${n !== 1 ? 's' : ''} found`,
        welcomeTitle: 'AI Safety Radar',
        welcomeSub: 'Daily digest of AI safety research, policy, and developments.',
        welcomeHint: 'Select a digest from the sidebar to begin reading.',
        fileLabels: {
          'safety-daily': 'Daily Brief',
          'safety-weekly': 'Weekly Summary',
          'safety-research': 'Research Papers',
          'safety-analysis': 'Analysis & Policy',
          'safety-community': 'Community & Tools',
          // Legacy labels for older digests
          'safety-arxiv': 'ArXiv Papers',
          'safety-github': 'GitHub Activity',
          'safety-rss': 'Blog Posts',
          'safety-aisi': 'AI Safety Institutes',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Journal Articles',
        },
        badges: { daily: 'Executive Summary', weekly: 'weekly' },
        locale: 'en-US',
        siteTitle: 'AI Safety',
        siteTitleSub: 'Radar',
      },
      fr: {
        disclaimer: 'Le Radar de la Sécurité de l\'IA est un bulletin entièrement automatisé et peut contenir des erreurs. Consultez toujours les sources originales pour plus de précision. Il s\'agit d\'un projet personnel, non d\'une publication officielle, et son contenu ne reflète pas les opinions du Conseil national de recherches ou du gouvernement du Canada.',
        loading: 'Chargement de la liste...',
        noDigests: 'Aucun bulletin disponible pour l\'instant.<br>Lancez le pipeline pour générer le premier bulletin.',
        loadingContent: 'Chargement...',
        failedLoad: 'Impossible de charger le bulletin.',
        searchPlaceholder: 'Rechercher...',
        resultsFound: (n) => `${n} résultat${n !== 1 ? 's' : ''} trouvé${n !== 1 ? 's' : ''}`,
        welcomeTitle: 'Sécurité de l\'IA - Radar',
        welcomeSub: 'Synthèse quotidienne de la recherche, des politiques et des développements en matière de sécurité de l\'IA.',
        welcomeHint: 'Sélectionnez un bulletin dans la barre latérale pour commencer à lire.',
        fileLabels: {
          'safety-daily': 'Bulletin quotidien',
          'safety-weekly': 'Résumé hebdomadaire',
          'safety-research': 'Articles de recherche',
          'safety-analysis': 'Analyse et politiques',
          'safety-community': 'Communauté et outils',
          // Legacy labels for older digests
          'safety-arxiv': 'Articles ArXiv',
          'safety-github': 'Activité GitHub',
          'safety-rss': 'Articles de blogue',
          'safety-aisi': 'Instituts de sécurité de l\'IA',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Articles scientifiques',
        },
        badges: { daily: 'Résumé exécutif', weekly: 'hebdo' },
        locale: 'fr-CA',
        siteTitle: 'Sécurité de l\'IA -',
        siteTitleSub: 'Radar',
      },
    };

    // Language management
    function getLang() {
      return localStorage.getItem('lang') || 'en';
    }

    function t() {
      return I18N[getLang()];
    }

    function applyLang(lang) {
      const strings = I18N[lang];
      document.getElementById('langToggle').textContent = lang === 'en' ? 'FR' : 'EN';
      const welcomeTitle = document.getElementById('welcomeTitle');
      const welcomeSub = document.getElementById('welcomeSub');
      const welcomeHint = document.getElementById('welcomeHint');
      if (welcomeTitle) welcomeTitle.textContent = strings.welcomeTitle;
      if (welcomeSub) welcomeSub.textContent = strings.welcomeSub;
      if (welcomeHint) welcomeHint.textContent = strings.welcomeHint;
      document.getElementById('logoText').innerHTML = `${strings.siteTitle} <span>${strings.siteTitleSub}</span>`;
    }

    function hashForLang(hash, lang) {
      if (!hash) return hash;
      if (lang === 'fr') {
        // Switch to .fr.md version
        return hash.endsWith('.fr.md') ? hash : hash.replace('.md', '.fr.md');
      } else {
        // Switch to .md version
        return hash.replace('.fr.md', '.md');
      }
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      const next = getLang() === 'en' ? 'fr' : 'en';
      localStorage.setItem('lang', next);
      applyLang(next);
      if (currentManifest) renderSidebar(currentManifest);
      const hash = location.hash.slice(1);
      if (hash) {
        const newHash = hashForLang(hash, next);
        // Update URL silently then load content
        history.replaceState(null, '', '#' + newHash);
        loadContent(newHash);
      }
    });

    // Cache loaded content for search
    const contentCache = {};

    // Theme management
    function getTheme() {
      return localStorage.getItem('theme') || 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('iconSun').style.display = theme === 'dark' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark' ? 'none' : 'block';
    }

    applyTheme(getTheme());

    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = getTheme() === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });

    // Sort files: daily/weekly first, then alphabetical
    function sortFiles(files) {
      const priority = { 'weekly': 0, 'daily': 1, 'research': 2 };
      return [...files].sort((a, b) => {
        const pa = Object.entries(priority).find(([k]) => a.includes(k));
        const pb = Object.entries(priority).find(([k]) => b.includes(k));
        const va = pa ? pa[1] : 99;
        const vb = pb ? pb[1] : 99;
        if (va !== vb) return va - vb;
        return a.localeCompare(b);
      });
    }

    function filterFilesByLang(files) {
      const lang = getLang();
      if (lang === 'fr') {
        // For each EN file, show its .fr.md if it exists, otherwise show the EN file
        return files
          .filter(f => !f.endsWith('.fr.md'))
          .map(f => files.includes(f.replace('.md', '.fr.md')) ? f.replace('.md', '.fr.md') : f);
      } else {
        return files.filter(f => !f.endsWith('.fr.md'));
      }
    }

    function fileLabel(filename) {
      const map = t().fileLabels;
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.fr\.md$/, '').replace('.md', '');
    }

    function fileBadge(filename) {
      if (filename.includes('daily')) return `<span class="badge badge-daily">${t().badges.daily}</span>`;
      if (filename.includes('weekly')) return `<span class="badge badge-weekly">${t().badges.weekly}</span>`;
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    let currentManifest = null;

    function monthKey(date) {
      return date.slice(0, 7); // "YYYY-MM"
    }

    function monthLabel(ym) {
      const [y, m] = ym.split('-');
      return new Date(+y, +m - 1, 1).toLocaleDateString(t().locale, { month: 'long', year: 'numeric' });
    }

    function renderSidebar(manifest) {
      currentManifest = manifest;
      const sidebar = document.getElementById('sidebar');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = `<div class="loading">${t().noDigests}</div>`;
        return;
      }

      // Group entries by month
      const months = [];
      const monthMap = {};
      for (const entry of manifest.entries) {
        const mk = monthKey(entry.date);
        if (!monthMap[mk]) { monthMap[mk] = []; months.push(mk); }
        monthMap[mk].push(entry);
      }

      const chevronSvg = `<svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

      let html = `<div class="search-box"><input type="text" id="searchInput" placeholder="${t().searchPlaceholder}"></div>`;
      html += '<div class="sidebar-entries" id="sidebarEntries">';

      months.forEach((mk, mi) => {
        const monthCollapsed = mi > 0 ? ' collapsed' : '';
        html += `<div class="month-group${monthCollapsed}" data-month="${mk}">`;
        html += `<div class="month-label"><span>${monthLabel(mk)}</span>${chevronSvg}</div>`;

        const entriesHtml = monthMap[mk].map((entry, i) => {
          const sorted = sortFiles(filterFilesByLang(entry.files));
          const dayCollapsed = (mi === 0 && i === 0) ? '' : ' collapsed';
          const filesHtml = sorted.map(file =>
            `<a href="#${file}" class="file-link" data-hash="${file}" data-label="${fileLabel(file).toLowerCase()}" data-date="${entry.date}">${fileLabel(file)}${fileBadge(file)}</a>`
          ).join('');
          const filesHeight = sorted.length * 42;
          const d = new Date(entry.date + 'T12:00:00');
          const lang = getLang();
          let dateDisplay;
          if (lang === 'fr') {
            dateDisplay = d.toLocaleDateString('fr-CA', { weekday: 'long', day: 'numeric', month: 'long' });
          } else {
            const day = d.getDate();
            const suffix = [,'st','nd','rd'][day % 10 > 3 ? 0 : (day % 100 - day % 10 !== 10) * (day % 10)] || 'th';
            dateDisplay = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).replace(/\d+/, day + suffix);
          }
          return `<div class="date-group${dayCollapsed}" data-date="${entry.date}">
            <div class="date-label"><span>${dateDisplay}</span>${chevronSvg}</div>
            <div class="date-files" style="max-height:${dayCollapsed ? 0 : filesHeight}px">${filesHtml}</div>
          </div>`;
        }).join('');

        html += `<div class="month-entries">${entriesHtml}</div>`;
        html += '</div>';
      });

      html += '</div>';
      sidebar.innerHTML = html;

      // Wire up month collapsing
      document.querySelectorAll('.month-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.month-group');
          group.classList.toggle('collapsed');
        });
      });

      // Wire up day collapsing
      document.querySelectorAll('.date-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.date-group');
          const files = group.querySelector('.date-files');
          const isCollapsed = group.classList.toggle('collapsed');
          files.style.maxHeight = isCollapsed ? '0px' : files.scrollHeight + 'px';
        });
      });

      // Wire up search
      document.getElementById('searchInput').addEventListener('input', handleSearch);
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const monthGroups = document.querySelectorAll('.month-group');
      const dateGroups = document.querySelectorAll('.date-group');

      if (!query) {
        // Restore original state: first month expanded, first day expanded, rest collapsed
        monthGroups.forEach((mg, mi) => {
          mg.classList.remove('hidden');
          mg.classList.toggle('collapsed', mi > 0);
        });
        dateGroups.forEach((dg, di) => {
          dg.classList.remove('hidden');
          dg.classList.toggle('collapsed', di > 0);
          const files = dg.querySelector('.date-files');
          if (files) files.style.maxHeight = di > 0 ? '0px' : files.scrollHeight + 'px';
        });
        document.querySelectorAll('.file-link').forEach(l => l.style.display = '');
        const info = document.querySelector('.search-results-info');
        if (info) info.remove();
        return;
      }

      let totalMatches = 0;
      dateGroups.forEach(group => {
        const date = group.dataset.date;
        const links = group.querySelectorAll('.file-link');
        let groupHasMatch = false;

        links.forEach(link => {
          const label = link.dataset.label;
          const file = link.dataset.hash;
          const cached = contentCache[file] || '';
          const matches = date.includes(query) || label.includes(query) || cached.toLowerCase().includes(query);
          link.style.display = matches ? '' : 'none';
          if (matches) { groupHasMatch = true; totalMatches++; }
        });

        group.classList.toggle('hidden', !groupHasMatch);
        if (groupHasMatch) {
          group.classList.remove('collapsed');
          const files = group.querySelector('.date-files');
          if (files) files.style.maxHeight = files.scrollHeight + 'px';
        }
      });

      // Show/hide month groups based on whether any day inside matches
      monthGroups.forEach(mg => {
        const hasVisible = [...mg.querySelectorAll('.date-group')].some(dg => !dg.classList.contains('hidden'));
        mg.classList.toggle('hidden', !hasVisible);
        if (hasVisible) {
          mg.classList.remove('collapsed');
        }
      });

      // Show count
      let info = document.querySelector('.search-results-info');
      if (!info) {
        info = document.createElement('div');
        info.className = 'search-results-info';
        document.getElementById('sidebarEntries').prepend(info);
      }
      info.textContent = t().resultsFound(totalMatches);
    }

    async function loadContent(file) {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="loading">${t().loadingContent}</div>`;

      try {
        const res = await fetch(`digests/${file}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        contentCache[file] = md;
        content.innerHTML = marked.parse(md) + `<div class="ai-disclaimer">${t().disclaimer}</div>`;
      } catch {
        content.innerHTML = `<div class="loading">${t().failedLoad}</div>`;
      }

      document.querySelectorAll('.file-link').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === file);
      });
    }

    // Preload content for search indexing
    async function preloadContent(manifest) {
      for (const entry of manifest.entries) {
        for (const file of entry.files) {
          if (contentCache[file]) continue;
          try {
            const res = await fetch(`digests/${file}`);
            if (res.ok) contentCache[file] = await res.text();
          } catch {}
        }
      }
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
    }

    async function init() {
      applyLang(getLang());
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();

      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const sorted = sortFiles(filterFilesByLang(latest.files));
        if (sorted.length > 0) location.hash = sorted[0];
      }

      // Preload in background for search
      preloadContent(manifest);
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
